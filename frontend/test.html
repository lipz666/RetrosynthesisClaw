<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">API测试</h1>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">测试表单</h2>
            <form id="testForm" class="space-y-4">
                <div>
                    <label for="target" class="block text-sm font-medium text-gray-700 mb-1">目标分子</label>
                    <input type="text" id="target" name="target" value="CCO" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                    测试API
                </button>
            </form>
        </div>
        
        <div id="result" class="bg-white rounded-lg shadow-md p-6"></div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const target = document.getElementById('target').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<div class="text-center py-8"><div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600"></div><p class="mt-4">测试中...</p></div>';
            
            try {
                const response = await fetch('http://localhost:8000/route', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        target: target,
                        top_k: 3,
                        debug: false
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP错误 ${response.status}`);
                }
                
                const data = await response.json();
                resultDiv.innerHTML = '<pre class="whitespace-pre-wrap">' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                resultDiv.innerHTML = '<div class="text-red-500">' + error.message + '</div>';
            }
        });
    </script>
</body>
</html>
